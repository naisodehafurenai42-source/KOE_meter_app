<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>こえのものさし めーたー</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #E3F2FD;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
            transition: background-color 0.4s ease;
            user-select: none; -webkit-user-select: none;
        }

        /* 案内メッセージ */
        #status-label {
            font-size: 26px; font-weight: bold; color: #444;
            background-color: #fff; padding: 10px 25px;
            border-radius: 20px; margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        #status-area { text-align: center; margin-bottom: 15px; }

        /* 📷 写真表示エリア（動きをつけるためのアニメーション設定） */
        #face-display {
            width: 260px; height: 260px;
            margin: 0 auto 15px auto;
            border-radius: 50%;
            border: 8px solid #fff;
            overflow: hidden;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
            background-color: #fff;
            display: flex; align-items: center; justify-content: center;
        }
        #face-image {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 0.2s ease;
        }

        /* 動き（アニメーション）のクラス */
        .bounce { animation: bounceAnim 0.6s infinite alternate; } /* 緑：ごきげんな縦揺れ */
        .shake { animation: shakeAnim 0.15s infinite; }           /* 赤：ガタガタ震える */

        @keyframes bounceAnim {
            0% { transform: translateY(0); }
            100% { transform: translateY(-15px); }
        }
        @keyframes shakeAnim {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(2px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(2px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        /* 🔢 大きな数字（こえのものさしレベル） */
        #level-number {
            font-size: 90px; font-weight: 900; color: #333;
            line-height: 1; margin-bottom: 10px;
            text-shadow: 2px 2px 0px #fff;
        }

        #message {
            font-size: 44px; font-weight: bold; color: #333;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 12px 50px; border-radius: 40px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            display: inline-block;
        }

        /* 🔘 操作ボタン */
        .btn-group { display: flex; gap: 20px; margin-top: 20px; }
        .control-btn {
            font-size: 30px; font-weight: bold; padding: 18px 45px;
            border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }
        .control-btn:active { transform: scale(0.95); }
        
        #rec-btn { background-color: #FF5252; color: white; }
        #stop-btn { background-color: #4ECDC4; color: white; }
    </style>
</head>
<body>

    <div id="status-label">👇 ボタンを おして おはなししてね</div>

    <div id="status-area">
        <div id="face-display">
            <img id="face-image" src="1.png" alt="キャラクターの顔">
        </div>

        <div id="level-number">-</div>

        <div id="message">おはなしの じゅんび</div>
    </div>

    <div class="btn-group">
        <button id="rec-btn" class="control-btn" onclick="startRecording()">🎤 ろくおん スタート</button>
        <button id="stop-btn" class="control-btn" onclick="stopRecording()" style="display:none;">🛑 とめる（おわり）</button>
    </div>

    <script>
        let audioContext; let analyser; let javascriptNode;
        let isRecording = false;
        let totalVolume = 0;
        let sampleCount = 0;

        // 1. 【ろくおん スタート】
        function startRecording() {
            isRecording = true;
            totalVolume = 0;
            sampleCount = 0;

            document.getElementById('rec-btn').style.display = 'none';
            document.getElementById('stop-btn').style.display = 'block';
            document.getElementById('status-label').innerText = "👂 こえを きいています... おはなししてね";
            document.getElementById('level-number').innerText = "⏱️";
            document.getElementById('message').innerText = "おはなしちゅう";
            document.getElementById('face-image').src = "3.png"; // お話中は笑顔
            document.getElementById('face-image').className = ""; 
            document.body.style.backgroundColor = "#FFF9C4"; // 背景を薄い黄色に

            if (!audioContext) { initAudio(); } else { audioContext.resume(); }
        }

        // 2. 【とめる】を押したら平均を計算して結果を表示
        function stopRecording() {
            isRecording = false;
            document.getElementById('stop-btn').style.display = 'none';
            document.getElementById('rec-btn').style.display = 'block';
            document.getElementById('status-label').innerText = "👇 いまの声の結果（けっか）だよ";

            // 録音中の平均音量を計算
            let averageVolume = sampleCount > 0 ? (totalVolume / sampleCount) : 0;
            
            // 平均音量を「こえのものさし（1〜5）」に変換
            let finalLevel = 1;
            if (averageVolume < 2) { finalLevel = 1; }
            else if (averageVolume < 10) { finalLevel = 2; }
            else if (averageVolume < 35) { finalLevel = 3; }
            else if (averageVolume < 65) { finalLevel = 4; }
            else { finalLevel = 5; }

            showResult(finalLevel);
        }

        // マイクから音を取得する設定
        function initAudio() {
            navigator.mediaDevices.getUserMedia({ audio: true, video: false })
                .then(function(stream) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    analyser = audioContext.createAnalyser();
                    let microphone = audioContext.createMediaStreamSource(stream);
                    javascriptNode = audioContext.createScriptProcessor(2048, 1, 1);

                    analyser.smoothingTimeConstant = 0.2;
                    analyser.fftSize = 1024;

                    microphone.connect(analyser);
                    analyser.connect(javascriptNode);
                    javascriptNode.connect(audioContext.destination);

                    javascriptNode.onaudioprocess = function() {
                        if (!isRecording) return;

                        let array = new Uint8Array(analyser.frequencyBinCount);
                        analyser.getByteFrequencyData(array);
                        let values = 0;
                        for (let i = 0; i < array.length; i++) { values += array[i]; }
                        let average = values / array.length;

                        // データの蓄積
                        totalVolume += average;
                        sampleCount++;
                    }
                })
                .catch(function(err) {
                    alert("マイクの許可がありません。");
                });
        }

        // 3. 【判定結果の表示】PDFのデータに基づいた5段階表示
        function showResult(level) {
            const body = document.body;
            const faceImg = document.getElementById('face-image');
            const numDisplay = document.getElementById('level-number');
            const message = document.getElementById('message');

            numDisplay.innerText = level;
            faceImg.className = ""; // アニメーションを一旦リセット

            if (level === 1) {
                // 1：こえなし
                body.style.backgroundColor = "#E3F2FD"; // 青
                faceImg.src = "1.png";
                message.innerText = "1：こえなし (🤫)";
                numDisplay.style.color = "#0D47A1";
            } else if (level === 2) {
                // 2：ちいさなこえ
                body.style.backgroundColor = "#E0F7FA"; // 水色
                faceImg.src = "2.png";
                message.innerText = "2：ちいさなこえ (🤫)";
                numDisplay.style.color = "#006064";
            } else if (level === 3) {
                // 3：ふつうのこえ
                body.style.backgroundColor = "#E8F5E9"; // 緑
                faceImg.src = "3.png";
                faceImg.classList.add("bounce"); // ✨ ごきげんにピョコピョコ縦揺れする動き！
                message.innerText = "3：ふつうのこえ (😊)";
                numDisplay.style.color = "#1B5E20";
            } else if (level === 4) {
                // 4：おおきいこえ
                body.style.backgroundColor = "#FFFDE7"; // 黄色
                faceImg.src = "4.png";
                message.innerText = "4：おおきいこえ (😮)";
                numDisplay.style.color = "#F57F17";
            } else {
                // 5：さけびこえ
                body.style.backgroundColor = "#FFEBEE"; // 赤
                faceImg.src = "5.png";
                faceImg.classList.add("shake"); // ✨ ガタガタ震える動き！
                message.innerText = "5：さけびこえ (😣)";
                numDisplay.style.color = "#B71C1C";
            }
        }
    </script>
</body>
</html>
